name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - '*.c'
      - 'tests/**'
      - 'Makefile'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run unit tests (Linux)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run tests
        run: make test
